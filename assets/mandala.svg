    <line x1="250" y1="150" x2="250" y2="132" transform="rotate(180 250 250)"/>
    <line x1="250" y1="150" x2="250" y2="132" transform="rotate(195 250 250)"/>
    <line x1="250" y1="150" x2="250" y2="132" transform="rotate(210 250 250)"/>
    <line x1="250" y1="150" x2="250" y2="132" transform="rotate(225 250 250)"/>
    <line x1="250" y1="150" x2="250" y2="132" transform="rotate(240 250 250)"/>
    <line x1="250" y1="150" x2="250" y2="132" transform="rotate(255 250 250)"/>
    <line x1="250" y1="150" x2="250" y2="132" transform="rotate(270 250 250)"/>
    <line x1="250" y1="150" x2="250" y2="132" transform="rotate(285 250 250)"/>
    <line x1="250" y1="150" x2="250" y2="132" transform="rotate(300 250 250)"/>
    <line x1="250" y1="150" x2="250" y2="132" transform="rotate(315 250 250)"/>
    <line x1="250" y1="150" x2="250" y2="132" transform="rotate(330 250 250)"/>
    <line x1="250" y1="150" x2="250" y2="132" transform="rotate(345 250 250)"/>
  </g>
  
  <circle cx="250" cy="250" r="120" class="mandala-stroke" stroke-width="3"/>
  <circle cx="250" cy="250" r="136" class="mandala-stroke" stroke-width="4"/>
  <circle cx="250" cy="250" r="148" class="mandala-stroke" stroke-width="3" stroke-dasharray="6,10"/>
  <circle cx="250" cy="250" r="162" class="mandala-stroke" stroke-width="7"/>
  <circle cx="250" cy="250" r="178" class="mandala-stroke" stroke-width="3"/>
  <circle cx="250" cy="250" r="195" class="mandala-stroke" stroke-width="3" stroke-dasharray="4,8"/>
  <circle cx="250" cy="250" r="215" class="mandala-stroke" stroke-width="5"/>
  <circle cx="250" cy="250" r="235" class="mandala-stroke" stroke-width="2.5" stroke-dasharray="20,12"/>
  <circle cx="250" cy="250" r="245" class="mandala-stroke" stroke-width="3"/>
</svg>
