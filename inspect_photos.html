<!DOCTYPE html>
<html>
<head>
  <title>Inspect Photos</title>
  <style>
    body { font-family: sans-serif; background: #FAF5ED; padding: 2rem; }
    .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 2rem; }
    .card { background: white; padding: 1rem; border: 1px solid #ccc; }
    .card img { width: 100%; max-height: 400px; object-fit: contain; }
  </style>
</head>
<body>
  <h1>Inspect Cafe Photos</h1>
  <div class="grid">
    <div class="card">
      <h2>cafe_photo_1.webp</h2>
      <img src="assets/cafe_photo_1.webp">
    </div>
    <div class="card">
      <h2>cafe_photo_2.webp</h2>
      <img src="assets/cafe_photo_2.webp">
    </div>
    <div class="card">
      <h2>cafe_photo_3.webp</h2>
      <img src="assets/cafe_photo_3.webp">
    </div>
    <div class="card">
      <h2>cafe_photo_4.webp</h2>
      <img src="assets/cafe_photo_4.webp">
    </div>
  </div>
</body>
</html>
